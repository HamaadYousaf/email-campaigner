version: "3.9"

services:
    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - "6379:6379"

    prometheus:
        image: prom/prometheus:latest
        restart: unless-stopped
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        ports:
            - "9090:9090"

    grafana:
        image: grafana/grafana:latest
        restart: unless-stopped
        ports:
            - "3000:3000"
